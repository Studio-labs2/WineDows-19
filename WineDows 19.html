<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WineDows 19 - Игровая платформа</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      background-image: url('images/background.png');
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
      background-position: center center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* Анимация загрузки */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: opacity 0.5s;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid #fff;
      border-top: 5px solid #0078d4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #loading-text {
      color: white;
      margin-top: 20px;
      font-size: 18px;
    }

    #desktop {
      position: relative;
      width: 100%;
      height: calc(100vh - 40px);
      overflow-y: auto;
      padding: 20px;
      cursor: default;
    }

    /* Стилизация скроллбара */
    #desktop::-webkit-scrollbar {
      width: 8px;
    }

    #desktop::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
    }

    #desktop::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 4px;
    }

    .icon {
      position: absolute;
      cursor: pointer;
      width: 80px;
      height: 80px;
      text-align: center;
      transition: all 0.2s ease;
      padding: 5px;
      border-radius: 8px;
    }

    .icon:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
    }

    .icon:active {
      transform: scale(0.95);
    }

    .icon img {
      width: 48px;
      height: 48px;
      margin: 0 auto;
      display: block;
      border-radius: 12px;
    }

    .icon span {
      font-size: 11px;
      display: block;
      text-align: center;
      margin-top: 4px;
      color: white;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      word-wrap: break-word;
    }

    /* Контекстное меню */
    .context-menu {
      position: fixed;
      background: rgba(32, 32, 32, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 5px 0;
      min-width: 180px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      z-index: 10000;
      animation: fadeIn 0.1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .context-menu-item {
      padding: 8px 15px;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 13px;
    }

    .context-menu-item:hover {
      background: rgba(0, 120, 212, 0.8);
    }

    .context-menu-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
      margin: 5px 0;
    }

    /* Уведомления */
    .notification {
      position: fixed;
      bottom: 50px;
      right: 20px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      border-left: 4px solid #0078d4;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      font-size: 14px;
      max-width: 300px;
    }

    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Панель задач */
    #taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      z-index: 1000;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    #start-button {
      background: rgba(0, 120, 212, 0.8);
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      font-size: 14px;
    }

    #start-button:hover {
      background: rgba(0, 120, 212, 1);
      transform: scale(1.05);
    }

    #taskbar-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    #clock {
      color: white;
      font-size: 12px;
      text-align: right;
    }

    #battery-status, #wifi-status {
      font-size: 14px;
    }

    /* Стартовое меню */
    .start-menu {
      position: fixed;
      bottom: 40px;
      left: 10px;
      width: 300px;
      background: rgba(32, 32, 32, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      z-index: 1001;
      animation: slideUp 0.2s ease;
      overflow: hidden;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .start-header {
      background: rgba(0, 120, 212, 0.8);
      padding: 15px;
      color: white;
      font-weight: bold;
    }

    .start-items {
      max-height: 400px;
      overflow-y: auto;
    }

    .start-item {
      padding: 10px 15px;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .start-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Игровой оверлей */
    .game-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s;
    }

    .game-content {
      background: #1e1e1e;
      border-radius: 15px;
      width: 90%;
      height: 85%;
      max-width: 1200px;
      position: relative;
      overflow: hidden;
    }

    .game-header {
      background: #2d2d2d;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-game {
      background: #ff4444;
      color: white;
      border: none;
      padding: 5px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    .game-iframe {
      width: 100%;
      height: calc(100% - 45px);
      border: none;
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="loader"></div>
  <div id="loading-text">Загрузка WineDows 19...</div>
</div>

<div id="desktop"></div>

<div id="taskbar">
  <button id="start-button">🏠 Пуск</button>
  <div id="taskbar-right">
    <span id="wifi-status">📶</span>
    <span id="battery-status">🔋 100%</span>
    <div id="clock"></div>
  </div>
</div>

<script>
  // Приложения с их URL и иконками
  const apps = [
    { name: "YouTube", url: "https://www.youtube.com", icon: "icons/youtube.png", x: 50, y: 100 },
    { name: "RuTube", url: "https://rutube.ru", icon: "icons/rutube.png", x: 150, y: 100 },
    { name: "Telegram", url: "https://web.telegram.org", icon: "icons/telegram.png", x: 50, y: 200 },
    { name: "Max", url: "https://web.max.ru", icon: "icons/max.png", x: 150, y: 200 },
    { name: "Википедия", url: "https://ru.wikipedia.org", icon: "icons/wikipedia.png", x: 250, y: 100 },
    { name: "Wace", url: "https://app.wace.ai", icon: "icons/wace.png", x: 50, y: 300 },
    { name: "Алиса", url: "https://alice.yandex.ru", icon: "icons/alice.png", x: 350, y: 100 },
    { name: "Google Meet", url: "https://meet.google.com", icon: "icons/meet.png", x: 50, y: 400 },
    { name: "Яндекс", url: "https://ya.ru", icon: "icons/yandex.png", x: 250, y: 200 },
    { name: "Google", url: "https://www.google.com", icon: "icons/google.png", x: 350, y: 200 },
    { name: "Google Play", url: "https://play.google.com", icon: "icons/google-play.png", x: 450, y: 200 },
    { name: "Яндекс Игры", url: "https://yandex.ru/games", icon: "icons/yandex-games.png", x: 550, y: 200 },
    { name: "GitHub", url: "https://github.com", icon: "icons/github.png", x: 50, y: 500 },
    { name: "Gmail", url: "https://mail.google.com", icon: "icons/gmail.png", x: 150, y: 500 },
    { name: "Яндекс Почта", url: "https://mail.yandex.ru", icon: "icons/yandex-mail.png", x: 250, y: 500 },
    { name: "Email", url: "https://mail.ru", icon: "icons/email.png", x: 350, y: 500 },
    { name: "VK", url: "https://vk.com", icon: "icons/vk.png", x: 450, y: 500 },
    { name: "Google Drive", url: "https://drive.google.com/drive/my-drive", icon: "icons/google-drive.png", x: 350, y: 300 },
    { name: "Yandex Drive", url: "https://disk.yandex.ru/client/recent", icon: "icons/yandex-drive.png", x: 450, y: 400 },
    { name: "Yandex Messenger", url: "https://yandex.ru/chat#/", icon: "icons/yandex-messenger.png", x: 350, y: 400 },
    { name: "Profi.ru", url: "https://profi.ru", icon: "icons/profi.png", x: 250, y: 300 },
    { name: "Yandex Food", url: "https://eda.yandex.ru", icon: "icons/yandex-food.png", x: 250, y: 400 },
    { name: "Учебник", url: "https://education.yandex.ru", icon: "icons/books.png", x: 150, y: 300 },
    { name: "Телепрограмма", url: "https://tv.yandex.ru", icon: "icons/tv-yandex.png", x: 150, y: 400 },
    { name: "Такси", url: "https://taxi.yandex.ru", icon: "icons/taxi-yandex.png", x: 450, y: 100 },
    { name: "Переводчик", url: "https://translate.yandex.ru", icon: "icons/translate.png", x: 550, y: 100 },
    { name: "GAME CASE DOWNLOAD", url: "https://sites.google.com/view/ruslankx-labs/главная-страница", icon: "icons/krg.jpg", x: 650, y: 100 },
    { name: "AI МАКСНЕЙРО", url: "app/gorogi-lire.html", icon: "icons/maks.jpg", x: 650, y: 200, local: true },
    { name: "Калькулятор", url: "app/calc.html", icon: "icons/calc.png", x: 550, y: 300, local: true },
    { name: "MAKS", url: "app/maksprotwo.html", icon: "icons/maks.png", x: 450, y: 300, local: true },
    { name: "Gaming Hub", url: "GamingHub.html", icon: "icons/Gaming.png", x: 550, y: 400, local: true },
    { name: "Microsoft", url: "folderMICROSOFT2.html", icon: "icons/folderMF.png", x: 550, y: 500, local: true },
    { name: "Панель отладки", url: "2window.html", icon: "icons/2window.png", x: 650, y: 600, local: true }
  ];

  // Фоновые изображения
  const backgrounds = [
    'images/background.png',
    'images/background1.png',
    'images/background2.png',
    'images/background3.png',
    'images/background4.png'
  ];

  let currentGameModal = null;
  let contextMenu = null;
  let startMenu = null;

  // Показать уведомление
  function showNotification(message, type = 'info') {
    const notification = document.createElement('div');
    notification.className = 'notification';
    notification.innerHTML = message;
    document.body.appendChild(notification);
    
    setTimeout(() => {
      notification.style.animation = 'slideOut 0.3s ease';
      setTimeout(() => notification.remove(), 300);
    }, 3000);
  }

  // Открыть приложение
  function openApp(app) {
    if (app.local) {
      // Для локальных файлов используем iframe модал
      if (currentGameModal) {
        currentGameModal.remove();
      }
      
      const modal = document.createElement('div');
      modal.className = 'game-modal';
      modal.innerHTML = `
        <div class="game-content">
          <div class="game-header">
            <span style="color: white;">${app.name}</span>
            <button class="close-game">✖ Закрыть</button>
          </div>
          <iframe class="game-iframe" src="${app.url}"></iframe>
        </div>
      `;
      
      modal.querySelector('.close-game').onclick = () => {
        modal.remove();
        currentGameModal = null;
      };
      
      document.body.appendChild(modal);
      currentGameModal = modal;
    } else {
      // Для внешних сайтов открываем в новой вкладке
      window.open(app.url, '_blank');
      showNotification(`Открытие ${app.name}...`, 'info');
    }
  }

  // Создать иконку на рабочем столе
  function createIcon(app) {
    const icon = document.createElement('div');
    icon.className = 'icon';
    icon.style.left = `${app.x}px`;
    icon.style.top = `${app.y}px`;
    icon.innerHTML = `
      <img src="${app.icon}" alt="${app.name}" onerror="this.src='icons/default.png'">
      <span>${app.name}</span>
    `;
    
    let clickTimer = null;
    
    icon.addEventListener('click', (e) => {
      if (clickTimer) {
        clearTimeout(clickTimer);
        clickTimer = null;
        openApp(app);
        e.stopPropagation();
      } else {
        clickTimer = setTimeout(() => {
          clickTimer = null;
        }, 200);
      }
      e.stopPropagation();
    });
    
    icon.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (contextMenu) contextMenu.remove();
      
      const menu = document.createElement('div');
      menu.className = 'context-menu';
      menu.style.left = `${e.pageX}px`;
      menu.style.top = `${e.pageY}px`;
      menu.innerHTML = `
        <div class="context-menu-item" data-action="open">🚀 Открыть</div>
        <div class="context-menu-item" data-action="copy">📋 Копировать имя</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="delete">🗑️ Удалить с рабочего стола</div>
      `;
      
      menu.querySelector('[data-action="open"]').onclick = () => {
        openApp(app);
        menu.remove();
      };
      
      menu.querySelector('[data-action="copy"]').onclick = () => {
        navigator.clipboard.writeText(app.name);
        showNotification(`Скопировано: ${app.name}`, 'info');
        menu.remove();
      };
      
      menu.querySelector('[data-action="delete"]').onclick = () => {
        icon.remove();
        showNotification(`${app.name} удалён с рабочего стола`, 'warning');
        menu.remove();
      };
      
      document.body.appendChild(menu);
      contextMenu = menu;
      
      const closeMenu = () => {
        if (contextMenu) {
          contextMenu.remove();
          contextMenu = null;
        }
        document.removeEventListener('click', closeMenu);
      };
      
      setTimeout(() => document.addEventListener('click', closeMenu), 0);
      e.stopPropagation();
    });
    
    return icon;
  }

  // Обновление часов
  function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    const dateStr = now.toLocaleDateString('ru-RU');
    document.getElementById('clock').innerHTML = `${timeStr}<br>${dateStr}`;
    
    // Обновление батареи (эмуляция)
    const battery = navigator.getBattery ? navigator.getBattery() : null;
    if (battery) {
      battery.then(bat => {
        document.getElementById('battery-status').innerHTML = `🔋 ${Math.round(bat.level * 100)}%`;
      });
    }
  }
  
  // Установка случайного фона
  function setRandomBackground() {
    const randomIndex = Math.floor(Math.random() * backgrounds.length);
    document.body.style.backgroundImage = `url('${backgrounds[randomIndex]}')`;
  }

  // Скрыть загрузочный экран
  function hideLoading() {
    const loading = document.getElementById('loading-overlay');
    loading.style.opacity = '0';
    setTimeout(() => loading.remove(), 500);
  }

  // Создать стартовое меню
  function createStartMenu() {
    if (startMenu) {
      startMenu.remove();
      startMenu = null;
      return;
    }
    
    const menu = document.createElement('div');
    menu.className = 'start-menu';
    menu.innerHTML = `
      <div class="start-header">
        🪟 WineDows 19
      </div>
      <div class="start-items">
        ${apps.slice(0, 15).map(app => `
          <div class="start-item" data-name="${app.name}">
            🖥️ ${app.name}
          </div>
        `).join('')}
      </div>
    `;
    
    menu.querySelectorAll('.start-item').forEach(item => {
      item.onclick = () => {
        const appName = item.dataset.name;
        const app = apps.find(a => a.name === appName);
        if (app) openApp(app);
        menu.remove();
        startMenu = null;
      };
    });
    
    document.body.appendChild(menu);
    startMenu = menu;
    
    const closeMenu = (e) => {
      if (!menu.contains(e.target)) {
        menu.remove();
        startMenu = null;
        document.removeEventListener('click', closeMenu);
      }
    };
    
    setTimeout(() => document.addEventListener('click', closeMenu), 0);
  }

  // Инициализация рабочего стола
  function initDesktop() {
    const desktop = document.getElementById('desktop');
    apps.forEach(app => {
      const icon = createIcon(app);
      desktop.appendChild(icon);
    });
  }

  // Добавить мини-игры
  function initMiniGames() {
    // Добавляем пасхалку с клавиатурой
    let konamiCode = [];
    const konamiSequence = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
    
    document.addEventListener('keydown', (e) => {
      konamiCode.push(e.key);
      if (konamiCode.length > konamiSequence.length) konamiCode.shift();
      
      if (JSON.stringify(konamiCode) === JSON.stringify(konamiSequence)) {
        showNotification('🎮 Код Konami активирован! +10 к продуктивности!', 'success');
        document.body.style.filter = 'hue-rotate(180deg)';
        setTimeout(() => document.body.style.filter = '', 3000);
      }
    });
    
    // Двойной клик по рабочему столу для смены фона
    document.getElementById('desktop').addEventListener('dblclick', (e) => {
      if (e.target === document.getElementById('desktop')) {
        setRandomBackground();
        showNotification('Фон рабочего стола изменён!', 'info');
      }
    });
  }

  // Запуск приложения
  document.addEventListener('DOMContentLoaded', () => {
    initDesktop();
    updateClock();
    setRandomBackground();
    initMiniGames();
    
    setInterval(updateClock, 1000);
    
    document.getElementById('start-button').onclick = createStartMenu;
    
    // Симуляция загрузки
    setTimeout(hideLoading, 1000);
    
    // Добавление эффектов на панель задач
    document.getElementById('taskbar-right').addEventListener('click', () => {
      showNotification(`WineDows 19\nВремя: ${new Date().toLocaleTimeString()}`, 'info');
    });
    
    // Показать приветствие
    setTimeout(() => {
      showNotification('Добро пожаловать в WineDows 19! 🎉', 'success');
    }, 1500);
  });
</script>

<style>
  @keyframes slideOut {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(400px); opacity: 0; }
  }
  
  /* Адаптивность для мобильных устройств */
  @media (max-width: 768px) {
    .icon {
      width: 70px;
      height: 70px;
    }
    
    .icon img {
      width: 40px;
      height: 40px;
    }
    
    .icon span {
      font-size: 10px;
    }
    
    .start-menu {
      width: 90%;
      left: 5%;
    }
    
    .game-content {
      width: 95%;
      height: 90%;
    }
  }
</style>
</body>
</html>
